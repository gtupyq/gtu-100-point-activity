    <polygon points="32,2 50,10 32,18 14,10" fill="none" stroke="#1DBE96" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="46" y1="11.5" x2="46" y2="20" stroke="#1DBE96" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="46" cy="21.5" r="2" fill="#1DBE96"/>
  </g>
  <!-- Hexagon badge -->
  <polygon points="32,16 53.78,28 53.78,52 32,64 10.22,52 10.22,28"
